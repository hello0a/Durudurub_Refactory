spring.application.name=durudurub

# 활성 프로필 (local 프로필: application-local.properties 자동 로드)
spring.profiles.active=local

# 데이터 소스 - MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/durudurub?serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false&autoReconnection=true
spring.datasource.username=aloha
spring.datasource.password=123456

# Mybatis 설정
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.aloha.durudurub.dto
mybatis.mapper-locations=classpath:mybatis/mapper/**/**.xml

# 서버 설정
server.port=8080

# Thymeleaf 설정
spring.thymeleaf.cache=false

# 에러 로그 설정
logging.level.org.springframework.web=DEBUG
logging.level.org.thymeleaf=DEBUG
server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-exception=true

# 세큐리티 DEBUG 로그
logging.level.org.springframework.security=DEBUG

# MultiPart 활성화 설정
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Tomcat 설정
server.tomcat.max-swallow-size=-1

# TOSS 설정
api.key=
toss.payments.client-key=
toss.payments.secret-key=
spring.devtools.livereload.enabled=true
spring.freemarker.cache=false

# OpenAI API 설정
# 로컬 전용 설정 (git에 추적되지 않음)
# 각자 API 키를 여기에 입력하세요
openai.api.key=
openai.api.url=https://api.openai.com/v1/chat/completions
openai.api.model=gpt-4o-mini

# jwt 
jwt.secret=VGhpc0lzQVNlY3JldEtleUZvckpXVEF1dGhUaGF0SXNMb25nRW5vdWdoMTIzNDU2
jwt.expiration=86400000

# Spring Security OAuth API 설정
spring.config.import=application-secret.properties
# 구글
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
# 카카오
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET}
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.redirect-uri=${KAKAO_REDIRECT_URI}
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email
# 네이버
spring.security.oauth2.client.registration.naver.client-id=${NAVER_CLIENT_ID}
spring.security.oauth2.client.registration.naver.client-secret=${NAVER_CLIENT_SECRET}
spring.security.oauth2.client.registration.naver.redirect-uri=${NAVER_REDIRECT_URI}
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.registration.naver.scope=name,email

# provider 설정
# 구글 - 기본값
# 카카오
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id
# 네이버
spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response
